<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRADE意思決定 閾値(DT)計算＆グラフ生成ツール</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (ブラウザ上でReactコードを変換) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* アニメーション用クラス */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.4s ease-out forwards;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
  
  <!-- アプリを描画する場所 -->
  <div id="root"></div>

  <!-- Reactアプリのコード -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- アイコンコンポーネントの定義 (LucideのSVGを直接埋め込み) ---
    const Icon = ({ path, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {path}
      </svg>
    );

    const Info = ({className}) => <Icon className={className} path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>} />;
    const AlertTriangle = ({className}) => <Icon className={className} path={<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />;
    const CheckCircle = ({className}) => <Icon className={className} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />;
    const BookOpen = ({className}) => <Icon className={className} path={<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>} />;
    const Calculator = ({className}) => <Icon className={className} path={<><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></>} />;
    const XCircle = ({className}) => <Icon className={className} path={<><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></>} />;
    const Star = ({className}) => <Icon className={className} path={<><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></>} />;
    const Search = ({className}) => <Icon className={className} path={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>} />;
    const Scale = ({className}) => <Icon className={className} path={<><path d="M17.6 7.6L12 2 6.4 7.6"/><path d="M12 2v20"/><path d="M5 10l-3 5v4a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-4l-3-5Z"/><path d="M19 10l3 5v4a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-4l3-5Z"/></>} />;
    const Activity = ({className}) => <Icon className={className} path={<><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></>} />;
    const HelpCircle = ({className}) => <Icon className={className} path={<><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />;
    const Lightbulb = ({className}) => <Icon className={className} path={<><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></>} />;
    const MessageSquareWarning = ({className}) => <Icon className={className} path={<><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M12 7v2"/><line x1="12" y1="13" x2="12.01" y2="13"/></>} />;
    const FileText = ({className}) => <Icon className={className} path={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>} />;
    const Database = ({className}) => <Icon className={className} path={<><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>} />;
    const ArrowRight = ({className}) => <Icon className={className} path={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>} />;
    const BarChart = ({className}) => <Icon className={className} path={<><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>} />;
    const Download = ({className}) => <Icon className={className} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} />;


    // --- メインアプリケーション ---
    const App = () => {
      // ★修正：初期タブを「1. 概念と落とし穴（explanation）」に設定
      const [activeTab, setActiveTab] = useState('explanation'); 
      
      const [outcomes, setOutcomes] = useState([
        { id: 1, name: '総死亡', utility: 0, overrideWeight: '', isBase: true, isWarning: false },
        { id: 2, name: '重篤な副作用', utility: 0.5, overrideWeight: '', isBase: false, isWarning: false },
        { id: 3, name: '【正】治療成功（悪い状態[失敗]のUtility=0.1を入力）', utility: 0.1, overrideWeight: '', isBase: false, isWarning: false },
        { id: 4, name: '【誤】治療成功（良い状態[成功]のUtility=0.9をそのまま入力）', utility: 0.9, overrideWeight: '', isBase: false, isWarning: true },
      ]);

      return (
        <div className="min-h-screen p-4 md:p-8">
          <div className="max-w-6xl mx-auto">
            <header className="mb-8 text-center">
              <h1 className="text-3xl font-bold text-blue-900 mb-2">
                GRADE意思決定 閾値(DT)計算＆グラフ生成ツール
              </h1>
              <p className="text-gray-600">
                Utility（効用値）、期待効用理論（EUT）の誤解を解き、正しい閾値を計算してグラフィカルに可視化します。<br/>
                <span className="text-sm">※GRADE Guidance 42 及び 専門家による批判的議論 (Annals of Internal Medicine, 2024-2025) 準拠</span>
              </p>
            </header>

            <div className="flex flex-wrap border-b border-gray-300 mb-6 bg-white rounded-t-lg shadow-sm text-sm md:text-base">
              <button
                className={`flex items-center py-3 px-3 md:px-5 font-semibold transition-colors ${activeTab === 'explanation' ? 'border-b-4 border-blue-600 text-blue-800 bg-blue-50/50' : 'text-gray-500 hover:text-blue-600'}`}
                onClick={() => setActiveTab('explanation')}
              >
                <BookOpen className="w-4 h-4 md:mr-2 mr-1" />
                <span className="hidden md:inline">1. 概念と落とし穴</span>
                <span className="md:hidden">1. 概念</span>
              </button>
              <button
                className={`flex items-center py-3 px-3 md:px-5 font-semibold transition-colors ${activeTab === 'theory' ? 'border-b-4 border-purple-600 text-purple-800 bg-purple-50/50' : 'text-gray-500 hover:text-purple-600'}`}
                onClick={() => setActiveTab('theory')}
              >
                <Database className="w-4 h-4 md:mr-2 mr-1" />
                <span className="hidden md:inline">2. 閾値計算の根拠と批判</span>
                <span className="md:hidden">2. 根拠</span>
              </button>
              <button
                className={`flex items-center py-3 px-3 md:px-5 font-semibold transition-colors ${activeTab === 'examples' ? 'border-b-4 border-indigo-600 text-indigo-800 bg-indigo-50/50' : 'text-gray-500 hover:text-indigo-600'}`}
                onClick={() => setActiveTab('examples')}
              >
                <FileText className="w-4 h-4 md:mr-2 mr-1" />
                <span className="hidden md:inline">3. 文献の具体例</span>
                <span className="md:hidden">3. 具体例</span>
              </button>
              <button
                className={`flex items-center py-3 px-3 md:px-5 font-semibold transition-colors ${activeTab === 'calculator' ? 'border-b-4 border-green-600 text-green-800 bg-green-50/50' : 'text-gray-500 hover:text-green-600'}`}
                onClick={() => setActiveTab('calculator')}
              >
                <Calculator className="w-4 h-4 md:mr-2 mr-1" />
                <span className="hidden md:inline">4. シミュレーター</span>
                <span className="md:hidden">4. 計算</span>
              </button>
              <button
                className={`flex items-center py-3 px-3 md:px-5 font-semibold transition-colors ${activeTab === 'graphical' ? 'border-b-4 border-rose-600 text-rose-800 bg-rose-50/50' : 'text-gray-500 hover:text-rose-600'}`}
                onClick={() => setActiveTab('graphical')}
              >
                <BarChart className="w-4 h-4 md:mr-2 mr-1" />
                <span className="hidden md:inline">5. グラフ生成＆保存</span>
                <span className="md:hidden">5. グラフ</span>
              </button>
            </div>

            <div className="bg-white rounded-b-xl shadow-lg p-4 md:p-8">
              {activeTab === 'explanation' && <ExplanationSection setActiveTab={setActiveTab} />}
              {activeTab === 'theory' && <TheoryAndCritiqueSection setActiveTab={setActiveTab} />}
              {activeTab === 'examples' && <ExamplesListSection setActiveTab={setActiveTab} />}
              {activeTab === 'calculator' && <CalculatorSection outcomes={outcomes} setOutcomes={setOutcomes} setActiveTab={setActiveTab} />}
              {activeTab === 'graphical' && <GraphicalSection outcomes={outcomes} />}
            </div>
          </div>
        </div>
      );
    };

    // --- 各セクションコンポーネント ---

    const GraphicalSection = ({ outcomes }) => {
      const [selectedId, setSelectedId] = useState(outcomes[0]?.id || 1);
      const [pe, setPe] = useState(-10);
      const [ciL, setCiL] = useState(-25);
      const [ciU, setCiU] = useState(5);

      const outcome = outcomes.find(o => o.id === parseInt(selectedId)) || outcomes[0];
      const BASE_THRESHOLDS = { trivial: 13.5, small: 32.1, moderate: 62.5 };
      const weight = (outcome.overrideWeight !== '' && outcome.overrideWeight !== null) 
        ? parseFloat(outcome.overrideWeight) 
        : Math.max(0, 1 - outcome.utility);

      const t1 = weight > 0 ? BASE_THRESHOLDS.trivial / weight : 0;
      const t2 = weight > 0 ? BASE_THRESHOLDS.small / weight : 0;
      const t3 = weight > 0 ? BASE_THRESHOLDS.moderate / weight : 0;

      const maxVal = Math.max(t3 * 1.3, Math.abs(ciL) * 1.2, Math.abs(ciU) * 1.2, 50);
      const xMax = maxVal;
      const xMin = -maxVal;

      const svgWidth = 800;
      const svgHeight = 350;
      const margin = { left: 50, right: 50 };
      const graphWidth = svgWidth - margin.left - margin.right;

      const scaleX = (val) => {
        let v = val;
        if (v < xMin) v = xMin;
        if (v > xMax) v = xMax;
        const ratio = (v - xMin) / (xMax - xMin);
        return margin.left + ratio * graphWidth;
      };

      const downloadJpeg = () => {
        const svg = document.getElementById('grade-graph-svg');
        if (!svg.getAttribute('xmlns')) {
          svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
        }
        const svgData = new XMLSerializer().serializeToString(svg);
        const canvas = document.createElement('canvas');
        const scale = 2;
        canvas.width = svgWidth * scale;
        canvas.height = svgHeight * scale;
        const ctx = canvas.getContext('2d');
        
        const img = new Image();
        img.onload = () => {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const a = document.createElement('a');
          a.href = canvas.toDataURL('image/jpeg', 0.95);
          a.download = `GRADE_DT_Graph_${outcome.name.substring(0, 10)}.jpg`;
          a.click();
        };
        img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
      };

      return (
        <div className="space-y-6 animate-fadeIn">
          <div className="bg-gradient-to-r from-rose-50 to-orange-50 border-l-4 border-rose-500 p-5 rounded-lg shadow-sm">
            <h2 className="text-xl font-bold text-rose-900 mb-2 flex items-center">
              <BarChart className="w-6 h-6 mr-2 text-rose-600" />
              グラフ生成＆保存機能
            </h2>
            <p className="text-gray-700 text-sm">
              シミュレーターで設定したアウトカムを選択し、推定効果（点推定値と信頼区間）の数値を入力してください。<br/>
              GRADEアプローチに基づく背景色つきの判定グラフが自動生成され、<strong>JPEG画像として保存</strong>できます。
            </p>
          </div>

          <div className="flex flex-col lg:flex-row gap-8">
            <div className="lg:w-1/3 bg-white p-5 rounded-xl border border-gray-200 shadow-sm space-y-5">
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-2">1. アウトカムの選択</label>
                <select value={selectedId} onChange={(e) => setSelectedId(e.target.value)} className="w-full p-2 border-2 border-gray-300 rounded-lg focus:border-rose-500 focus:outline-none">
                  {outcomes.map(o => <option key={o.id} value={o.id}>{o.name}</option>)}
                </select>
                <p className="text-xs text-gray-500 mt-1">※新しいアウトカムは「4.計算」タブで追加できます。</p>
              </div>

              <div className="pt-4 border-t border-gray-100">
                <label className="block text-sm font-bold text-gray-700 mb-3">2. 効果の入力（1000人あたりのイベント発生差）</label>
                <p className="text-xs text-red-600 font-bold mb-4 bg-red-50 p-2 rounded">
                  ※マイナス（減少）が Benefit、プラス（増加）が Harm となります。
                </p>
                
                <div className="space-y-5">
                  <div className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                    <label className="block text-sm font-bold text-gray-800 mb-2">点推定値 (Point Estimate)</label>
                    <div className="flex items-center gap-3">
                      <input type="range" min="-100" max="100" value={pe} onChange={(e) => setPe(Number(e.target.value))} className="flex-1" />
                      <input type="number" value={pe} onChange={(e) => setPe(Number(e.target.value))} className="w-20 p-2 text-base font-bold border-2 border-blue-300 rounded text-center focus:outline-none focus:border-blue-600 bg-white" />
                    </div>
                  </div>

                  <div className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                    <label className="block text-sm font-bold text-gray-800 mb-2">信頼区間 下限 (Lower CI)</label>
                    <div className="flex items-center gap-3">
                      <input type="range" min="-150" max="100" value={ciL} onChange={(e) => setCiL(Number(e.target.value))} className="flex-1" />
                      <input type="number" value={ciL} onChange={(e) => setCiL(Number(e.target.value))} className="w-20 p-2 text-base font-bold border-2 border-gray-300 rounded text-center focus:outline-none focus:border-gray-600 bg-white" />
                    </div>
                  </div>

                  <div className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                    <label className="block text-sm font-bold text-gray-800 mb-2">信頼区間 上限 (Upper CI)</label>
                    <div className="flex items-center gap-3">
                      <input type="range" min="-100" max="150" value={ciU} onChange={(e) => setCiU(Number(e.target.value))} className="flex-1" />
                      <input type="number" value={ciU} onChange={(e) => setCiU(Number(e.target.value))} className="w-20 p-2 text-base font-bold border-2 border-gray-300 rounded text-center focus:outline-none focus:border-gray-600 bg-white" />
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div className="lg:w-2/3 space-y-4">
              <div className="bg-white p-2 rounded-xl border border-gray-200 shadow-sm overflow-x-auto">
                <svg id="grade-graph-svg" width={svgWidth} height={svgHeight} viewBox={`0 0 ${svgWidth} ${svgHeight}`} style={{ backgroundColor: '#ffffff', fontFamily: 'sans-serif' }}>
                  {weight > 0 && (
                    <g id="background-zones">
                      {/* Left (Minus) = Benefit */}
                      <rect x={scaleX(xMin)} y="60" width={scaleX(-t3) - scaleX(xMin)} height="200" fill="#86efac" opacity="0.4" />
                      <rect x={scaleX(-t3)} y="60" width={scaleX(-t2) - scaleX(-t3)} height="200" fill="#bbf7d0" opacity="0.4" />
                      <rect x={scaleX(-t2)} y="60" width={scaleX(-t1) - scaleX(-t2)} height="200" fill="#dcfce7" opacity="0.5" />
                      {/* Center = Trivial */}
                      <rect x={scaleX(-t1)} y="60" width={scaleX(t1) - scaleX(-t1)} height="200" fill="#f3f4f6" opacity="0.8" />
                      {/* Right (Plus) = Harm */}
                      <rect x={scaleX(t1)} y="60" width={scaleX(t2) - scaleX(t1)} height="200" fill="#fee2e2" opacity="0.5" />
                      <rect x={scaleX(t2)} y="60" width={scaleX(t3) - scaleX(t2)} height="200" fill="#fecaca" opacity="0.4" />
                      <rect x={scaleX(t3)} y="60" width={scaleX(xMax) - scaleX(t3)} height="200" fill="#fca5a5" opacity="0.4" />
                    </g>
                  )}

                  {weight > 0 && (
                    <g id="threshold-lines-and-labels">
                      {[
                        { val: -t3, label: 'Large' }, { val: -t2, label: 'Mod.' }, { val: -t1, label: 'Small' },
                        { val: t1, label: 'Small' }, { val: t2, label: 'Mod.' }, { val: t3, label: 'Large' }
                      ].map((t, i) => (
                        <g key={i}>
                          <line x1={scaleX(t.val)} y1="60" x2={scaleX(t.val)} y2="260" stroke="#9ca3af" strokeWidth="1" strokeDasharray="4 4" />
                          <text x={scaleX(t.val)} y="50" textAnchor="middle" fontSize="10" fill="#6b7280">{t.label}</text>
                          <text x={scaleX(t.val)} y="275" textAnchor="middle" fontSize="10" fill="#6b7280">{Math.round(t.val)}</text>
                        </g>
                      ))}
                      <text x={scaleX((-t3-t2)/2)} y="35" textAnchor="middle" fontSize="12" fill="#15803d" fontWeight="bold">Benefit (利益 / 減少)</text>
                      <text x={scaleX((t3+t2)/2)} y="35" textAnchor="middle" fontSize="12" fill="#b91c1c" fontWeight="bold">Harm (害 / 増加)</text>
                      <text x={scaleX(0)} y="35" textAnchor="middle" fontSize="11" fill="#4b5563" fontWeight="bold">Trivial(些細)</text>
                    </g>
                  )}

                  <line x1={scaleX(0)} y1="40" x2={scaleX(0)} y2="280" stroke="#111827" strokeWidth="2" />
                  <text x={scaleX(0)} y="295" textAnchor="middle" fontSize="12" fill="#111827" fontWeight="bold">0</text>

                  <text x="20" y="25" fontSize="14" fill="#1e3a8a" fontWeight="bold">アウトカム: {outcome.name}</text>
                  <text x="20" y="335" fontSize="11" fill="#6b7280">Utility: {outcome.utility} / 計算用 Disutility: {weight.toFixed(2)}</text>
                  <text x={svgWidth - 20} y="335" textAnchor="end" fontSize="11" fill="#6b7280">1000人あたりのイベント発生差</text>

                  <line x1={margin.left} y1="260" x2={svgWidth - margin.right} y2="260" stroke="#4b5563" strokeWidth="1" />

                  <g id="effect-plot">
                    <line x1={scaleX(ciL)} y1="160" x2={scaleX(ciU)} y2="160" stroke="#1e40af" strokeWidth="3" />
                    <line x1={scaleX(ciL)} y1="150" x2={scaleX(ciL)} y2="170" stroke="#1e40af" strokeWidth="3" />
                    <line x1={scaleX(ciU)} y1="150" x2={scaleX(ciU)} y2="170" stroke="#1e40af" strokeWidth="3" />
                    <circle cx={scaleX(pe)} cy="160" r="8" fill="#2563eb" stroke="#ffffff" strokeWidth="2" />
                    <text x={scaleX(pe)} y="140" textAnchor="middle" fontSize="14" fill="#1e40af" fontWeight="bold">
                      {pe} <tspan fontSize="11" fontWeight="normal">[{ciL}, {ciU}]</tspan>
                    </text>
                  </g>
                </svg>
              </div>

              <button onClick={downloadJpeg} className="w-full flex items-center justify-center py-4 bg-gray-800 text-white rounded-xl hover:bg-black transition-colors shadow-md font-bold text-lg">
                <Download className="w-6 h-6 mr-2" />
                このグラフを JPEG 画像として保存
              </button>
            </div>
          </div>
        </div>
      );
    };

    const ExplanationSection = ({ setActiveTab }) => {
      return (
        <div className="space-y-10 animate-fadeIn">
          <section>
            <h2 className="text-2xl font-bold text-gray-800 border-l-4 border-blue-500 pl-3 mb-4">大前提：「Utility（状態）」と「Rate（率）」は全く別の概念です</h2>
            <div className="bg-blue-50 p-5 rounded-lg border border-blue-100 flex flex-col md:flex-row gap-6 mb-6">
              <div className="flex-1 bg-white p-4 rounded shadow-sm border-t-4 border-blue-400">
                <h3 className="font-bold text-blue-800 mb-2 text-lg flex items-center"><Activity className="w-5 h-5 mr-2" />① Utility（効用値）＝「状態」のスコア</h3>
                <p className="text-sm text-gray-700 mb-2">生存と死亡の間にある<strong>「状態の質」</strong>を、死亡を「0」、完全な健康を「1」として表した固定値です。</p>
                <p className="text-sm text-red-600 font-bold mt-2">⚠️ 決して「死亡率を0、生存率を1としたもの」ではありません！</p>
              </div>
              <div className="flex-1 bg-white p-4 rounded shadow-sm border-t-4 border-green-400">
                <h3 className="font-bold text-green-800 mb-2 text-lg flex items-center"><Scale className="w-5 h-5 mr-2" />② Rate（率）＝「人数の割合」</h3>
                <p className="text-sm text-gray-700 mb-2">特定のUtilityを持つ「状態の箱」に入った人数の割合（確率）です。</p>
                <p className="text-sm text-green-800 font-bold bg-green-50 p-2 rounded mt-2">「死亡率が5%下がる」と「生存率が5%上がる」は、全く同じ現象（人の移動）です。</p>
              </div>
            </div>
          </section>

          <section>
            <h2 className="text-2xl font-bold text-gray-800 border-l-4 border-purple-500 pl-3 mb-4">「Utility（状態）」と「閾値における利益・害」の違い</h2>
            <p className="text-sm text-gray-700"><strong>閾値における「利益・害」とは、Utilityの点数ではなく、「イベントが何人増えたか・減ったか」の話</strong>です。<br/>悪いイベントが減れば「利益」、増えれば「害」です。</p>
          </section>

          <section className="bg-orange-50 p-6 rounded-lg border-2 border-orange-300">
            <h2 className="text-xl font-bold text-orange-900 flex items-center mb-4"><Search className="w-6 h-6 mr-2" />核心的な矛盾：良いアウトカム（生存・成功）をどう計算するか？</h2>
            <div className="bg-white p-4 rounded shadow-sm mb-4 border-l-4 border-red-500">
              <h3 className="font-bold text-gray-800 mb-2">もし「治療成功（Utility = 0.9）」をそのまま数式に入れたら？</h3>
              <p className="text-sm text-gray-700">Disutilityは <strong>0.1</strong> になります。これでは「治療成功は死亡の10分の1の価値しかない」と判定され、閾値が異常に膨れ上がります。</p>
            </div>
            <div className="bg-white p-4 rounded shadow-sm border-l-4 border-green-500">
              <h3 className="font-bold text-gray-800 mb-2">【結論】「逆の悪い状態」で計算する</h3>
              <p className="text-sm text-gray-700"><span className="text-red-600 underline font-bold">良いアウトカムの増減（利益）を評価する場合は、必ず「逆の悪いアウトカム（不健康・失敗）」のUtilityに置き換えて計算しなければ、数学的に破綻します。</span></p>
            </div>
          </section>
        </div>
      );
    };

    const TheoryAndCritiqueSection = ({ setActiveTab }) => {
      return (
        <div className="space-y-10 animate-fadeIn">
          <section className="bg-blue-50 p-6 rounded-lg border border-blue-200">
            <h2 className="text-2xl font-bold text-blue-900 flex items-center mb-4"><Database className="w-8 h-8 mr-2 text-blue-600" />ベース値（13.5, 32.1, 62.5）はどこから算出されたのか？</h2>
            <p className="text-sm text-gray-700">「GRADE-THRESHOLD」というステークホルダーへの大規模アンケート調査に基づき、線形回帰モデルから導き出された全体的な平均値（汎用係数）です。</p>
          </section>
          <section className="bg-indigo-50 p-6 rounded-lg border border-indigo-200">
            <h2 className="text-2xl font-bold text-indigo-900 flex items-center mb-4"><Lightbulb className="w-8 h-8 mr-2 text-indigo-600" />なぜ「 T = ベース値 / Disutility 」という割り算の式になるのか？</h2>
            <div className="bg-white p-5 rounded-lg shadow-md border-l-4 border-indigo-500">
              <h3 className="font-bold text-lg text-gray-800 mb-3 border-b pb-2">根拠：期待効用理論（EUT）</h3>
              <div className="bg-gray-100 p-3 rounded text-center font-mono font-bold text-lg text-gray-800 mb-3">社会へのインパクト = Rateの変化人数 × Disutility</div>
              <p className="text-sm text-indigo-900 font-bold">結論：「T = ベース値 / Disutility」という割り算は、期待効用理論において『どれも等しく同じインパクトになる人数』を逆算するための、論理的な変換式です。</p>
            </div>
          </section>
          <section className="bg-red-50 p-6 rounded-lg border border-red-200">
            <h2 className="text-2xl font-bold text-red-900 flex items-center mb-4"><MessageSquareWarning className="w-8 h-8 mr-2 text-red-600" />専門家からの批判的吟味と警告</h2>
            <div className="grid md:grid-cols-2 gap-4">
              <div className="bg-white p-4 rounded shadow-sm border border-gray-200"><p className="text-sm">1. 線形モデルはEUTの公理に反する (Djulbegovic et al.)</p></div>
              <div className="bg-white p-4 rounded shadow-sm border border-gray-200"><p className="text-sm">2. 固定されたDisutilityの非現実性 (Chen & Jørgensen)</p></div>
              <div className="bg-white p-4 rounded shadow-sm border border-gray-200"><p className="text-sm">3. 「偽の正確性（False precision）」の危険性</p></div>
              <div className="bg-white p-4 rounded shadow-sm border border-gray-200"><p className="text-sm">4. 医療資源・労力の無視 (Time Needed to Treat)</p></div>
            </div>
          </section>
        </div>
      );
    };

    const ExamplesListSection = ({ setActiveTab }) => {
      return (
        <div className="space-y-8 animate-fadeIn">
          <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded text-sm text-blue-900"><p>GRADE Guidance 42の本文および付録に掲載されている、3つのアプローチごとの計算例です。</p></div>
          <section className="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <h3 className="text-xl font-bold text-indigo-900 mb-4 border-b pb-2">アプローチA：線形回帰モデルによる計算</h3>
            <p className="text-sm text-gray-700 mb-4">式例: <span className="font-mono bg-gray-100 px-1 rounded font-semibold">T1 = 0.073 - (0.061 × Disutility)</span></p>
            <div className="overflow-x-auto"><table className="min-w-full text-sm text-left border-collapse border border-gray-200">
              <thead className="bg-indigo-50 border-b-2 border-indigo-200"><tr><th className="border p-2">アウトカム</th><th className="border p-2">Utility</th><th className="border p-2">Disutility</th><th className="border p-2">T1</th></tr></thead>
              <tbody><tr><td className="border p-2">死亡</td><td className="border p-2">0</td><td className="border p-2">1.0</td><td className="border p-2">12人</td></tr></tbody>
            </table></div>
          </section>
          <section className="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <h3 className="text-xl font-bold text-green-900 mb-4 border-b pb-2">アプローチB：EUTベースの割り算 ＋ GDG調整</h3>
            <div className="overflow-x-auto"><table className="min-w-full text-sm text-left border-collapse border border-gray-200">
              <thead className="bg-green-50 border-b-2 border-green-200"><tr><th className="border p-2">アウトカム</th><th className="border p-2">Utility</th><th className="border p-2">Disutility</th><th className="border p-2">T1</th></tr></thead>
              <tbody>
                <tr><td className="border p-2">死亡</td><td className="border p-2">0</td><td className="border p-2">1.0</td><td className="border p-2">14人</td></tr>
                <tr className="bg-red-50"><td className="border p-2 text-red-900 font-bold">治療成功</td><td className="border p-2">0.9</td><td className="border p-2 text-red-600 font-bold">0.9(※失敗の不効用)</td><td className="border p-2 text-red-900 font-bold">15人</td></tr>
              </tbody>
            </table></div>
          </section>
        </div>
      );
    };

    const CalculatorSection = ({ outcomes, setOutcomes, setActiveTab }) => {
      const BASE_THRESHOLDS = { trivial: 13.5, small: 32.1, moderate: 62.5 };
      const handleUpdate = (id, field, value) => {
        setOutcomes(outcomes.map(out => {
          if (out.id === id) {
            const isWarning = field === 'utility' && value > 0.8;
            return { ...out, [field]: value, ...(field === 'utility' && { isWarning }) };
          }
          return out;
        }));
      };
      const addOutcome = () => setOutcomes([...outcomes, { id: Math.max(...outcomes.map(o => o.id), 0) + 1, name: '新規アウトカム', utility: 0.5, overrideWeight: '', isBase: false, isWarning: false }]);
      const removeOutcome = (id) => setOutcomes(outcomes.filter(o => o.id !== id));
      const calculateWeight = (outcome) => outcome.overrideWeight !== '' ? parseFloat(outcome.overrideWeight) : Math.max(0, 1 - outcome.utility);
      const calculateThreshold = (weight, baseThreshold) => weight <= 0 ? '∞' : (Math.round((baseThreshold / weight) * 10) / 10).toFixed(1);

      return (
        <div className="space-y-8 animate-fadeIn">
          <div className="bg-gradient-to-r from-green-50 to-green-100 border-l-4 border-green-500 p-5 rounded-lg shadow-sm mb-8">
            <h2 className="text-xl font-bold text-green-900 mb-3 flex items-center"><Lightbulb className="w-6 h-6 mr-2 text-green-600" />シミュレーターの正しい使い方</h2>
            <ol className="list-decimal pl-5 space-y-3 text-gray-800">
              <li><strong>アウトカム名</strong> と対象となる <strong>悪い状態のUtility</strong> を入力します。<br/><span className="text-red-600 text-sm font-bold">🚨良い結果の増減（利益）を評価する場合は、必ず「反対の悪い状態」のUtilityを入力してください。</span></li>
              <li>右側に <strong> T = 基準値 ÷ Disutility </strong> の式を用いて、閾値（人数）が自動計算されます。</li>
            </ol>
          </div>
          <div className="space-y-6">
            {outcomes.map((outcome) => {
              const weight = calculateWeight(outcome);
              const weightDisplay = isNaN(weight) ? 0 : weight.toFixed(2);
              return (
                <div key={outcome.id} className={`p-5 rounded-xl border-2 transition-all ${outcome.isBase ? 'border-gray-800 bg-gray-50' : outcome.isWarning ? 'border-red-400 bg-red-50' : 'border-gray-200 bg-white'}`}>
                  <div className="flex flex-col lg:flex-row gap-6">
                    <div className="flex-1 space-y-4">
                      <div className="flex items-center justify-between">
                        <input type="text" value={outcome.name} onChange={(e) => handleUpdate(outcome.id, 'name', e.target.value)} className="font-bold text-xl border-b-2 border-dashed focus:outline-none w-full mr-2 bg-transparent" disabled={outcome.isBase}/>
                        {!outcome.isBase && <button onClick={() => removeOutcome(outcome.id)} className="text-gray-400 hover:text-red-600 text-sm">✕ 削除</button>}
                      </div>
                      <div className="grid grid-cols-2 gap-4 bg-white/50 p-3 rounded-lg border border-gray-100">
                        <div><label className="block text-xs font-bold text-gray-700 mb-1">状態のUtility</label><input type="number" min="0" max="1" step="0.1" value={outcome.utility} onChange={(e) => handleUpdate(outcome.id, 'utility', parseFloat(e.target.value))} className="w-full p-2 border-2 rounded-lg text-lg font-semibold" /></div>
                        <div><label className="block text-xs font-bold text-gray-700 mb-1">手動Disutility(上書き)</label><input type="number" min="0" max="1" step="0.1" value={outcome.overrideWeight} onChange={(e) => handleUpdate(outcome.id, 'overrideWeight', e.target.value)} className="w-full p-2 border-2 rounded-lg text-sm bg-gray-50" /></div>
                      </div>
                      {outcome.isWarning && <p className="text-xs text-red-600 font-bold">⚠️ 警告：高いUtilityが入力されています。もし「治療成功」などの場合、必ず「失敗」など逆の悪い状態のUtilityを入力してください。</p>}
                    </div>
                    <div className="flex-1 bg-white p-5 rounded-xl border border-gray-200 shadow-inner flex flex-col justify-center text-center">
                      <div className="mb-4 border-b border-gray-100 pb-4"><span className="text-xs font-bold text-gray-500 block mb-1">重要性の重み (Disutility)</span><span className="text-4xl font-black text-blue-700">{weightDisplay}</span></div>
                      <div>
                        <span className="text-xs font-bold text-gray-500 block mb-2">1000人あたりの意思決定閾値</span>
                        <div className="grid grid-cols-3 gap-3 text-center">
                          <div className="bg-gray-50 p-2 rounded-lg border border-gray-200"><div className="text-xs font-bold mb-1">T1 (Small)</div><div className="text-xl font-bold">{calculateThreshold(weight, BASE_THRESHOLDS.trivial)}</div></div>
                          <div className="bg-blue-50 p-2 rounded-lg border border-blue-200"><div className="text-xs text-blue-700 font-bold mb-1">T2 (Mod)</div><div className="text-xl font-bold text-blue-800">{calculateThreshold(weight, BASE_THRESHOLDS.small)}</div></div>
                          <div className="bg-green-50 p-2 rounded-lg border border-green-200"><div className="text-xs text-green-700 font-bold mb-1">T3 (Large)</div><div className="text-xl font-bold text-green-800">{calculateThreshold(weight, BASE_THRESHOLDS.moderate)}</div></div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          <button onClick={addOutcome} className="mt-6 w-full py-4 border-2 border-dashed border-gray-300 text-gray-600 rounded-xl hover:bg-gray-50 font-bold text-lg text-center">+ 新しいアウトカムを追加する</button>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
